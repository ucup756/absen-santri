<div style="margin-bottom:16px">
  <div style="width:56px;height:56px;background:linear-gradient(135deg,#4f8ef7,#f0b429);border-radius:14px;
              display:inline-flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;
              color:white;margin-bottom:12px">{{ santri.nama[0] }}</div>
  <h4 style="font-size:18px;font-weight:700">{{ santri.nama }}</h4>
  <p style="color:var(--text3);font-size:13px">{{ santri.nis }} · {{ santri.kelas }}</p>
</div>

<div style="display:flex;justify-content:center;margin:20px 0">
  <div style="background:white;padding:16px;border-radius:12px;display:inline-block">
    <img src="data:image/png;base64,{{ qr_b64 }}" alt="QR {{ santri.nis }}"
         style="width:200px;height:200px;display:block">
  </div>
</div>

<p style="font-size:12px;color:var(--text3);margin-bottom:16px">
  Tunjukkan QR Code ini saat absensi berlangsung
</p>

<a href="/santri/qr/{{ santri.id }}?print=1" target="_blank"
   onclick="window.open(this.href,'_blank'); return false;"
   class="btn btn-primary">🖨 Print QR Code</a>
